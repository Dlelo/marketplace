# Test profile — overrides main application.properties so contextLoads()
# doesn't try to dial a real MySQL.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MYSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true

# Skip data.sql for tests — context-load tests don't need seed data and the
# schema-vs-seed ordering is finicky with H2.
spring.sql.init.mode=never

# Keep secrets blank during tests.
sendgrid.api-key=
twilio.account-sid=
twilio.auth-token=
twilio.from-number=

# SpacesConfig refuses to build the S3 client without creds, which breaks
# context load. Test stubs — they never reach DigitalOcean.
do.spaces.access-key=test-access-key
do.spaces.secret-key=test-secret-key
do.spaces.region=fra1
do.spaces.endpoint=http://localhost:9000
