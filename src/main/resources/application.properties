# Application Name
spring.application.name=marketplace

## MySQL Database Connection
//spring.datasource.url=jdbc:mysql://localhost:3307/yaya?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.url=jdbc:mysql://mysql_db:3306/yaya?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=yaya
spring.datasource.password=yaya
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Daraja (M-Pesa)
daraja.consumerKey=${DARAJA_CONSUMER_KEY:}
daraja.consumerSecret=${DARAJA_CONSUMER_SECRET:}
daraja.businessShortCode=${DARAJA_TILL_NUMBER:3131143}
daraja.passkey=${DARAJA_PASSKEY:}
daraja.callback-url=https://yayaconnectapp.com/api/payments/webhook/mpesa
daraja.baseUrl=https://api.safaricom.co.ke

do.spaces.endpoint=https://fra1.digitaloceanspaces.com
do.spaces.cdn-endpoint=https://yaya-doc.fra1.cdn.digitaloceanspaces.com
do.spaces.bucket=yaya-doc
do.spaces.access-key=${SPACES_ACCESS_KEY:}
do.spaces.secret-key=${SPACES_SECRET_KEY:}
do.spaces.region=fra1
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JPA (Hibernate) Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8080
//server.port=9090
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.example.marketplace=DEBUG
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-exception=true
server.forward-headers-strategy=native