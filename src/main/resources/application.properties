# Application Name
spring.application.name=marketplace

# MySQL Database Connection
# Defaults match the local-dev MySQL (localhost:3307/yaya, user yaya/yaya).
# docker-compose sets DB_HOST=mysql_db, DB_PORT=3306 so the same config works
# inside the container network.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:yaya}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:yaya}
spring.datasource.password=${DB_PASSWORD:yaya}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Daraja (M-Pesa)
daraja.consumerKey=${DARAJA_CONSUMER_KEY:}
daraja.consumerSecret=${DARAJA_SECRET_KEY:}
daraja.businessShortCode=${DARAJA_BUSINESS_SHORTCODE:3131143}
daraja.transactionType=${DARAJA_TRANSACTION_TYPE:CustomerBuyGoodsOnline}
daraja.passkey=${DARAJA_PASSKEY:}
daraja.callback-url=${DARAJA_CALLBACK_URL:https://yayaconnectapp.com/api/payments/webhook/mpesa}
daraja.baseUrl=${DARAJA_BASE_URL:https://api.safaricom.co.ke}

# SendGrid (Twilio) acc used for transactional email (password reset, etc.)
# Set SENDGRID_API_KEY in your environment. Without it, the app falls back to
# logging the reset URL to server logs (useful for local dev).
sendgrid.api-key=${SENDGRID_API_KEY:}
sendgrid.from-email=${SENDGRID_FROM_EMAIL:no-reply@yayaconnectapp.com}
sendgrid.from-name=${SENDGRID_FROM_NAME:YayaConnect}

# Public-facing frontend URL acc used to build links in outbound emails.
app.frontend-base-url=${FRONTEND_BASE_URL:https://yayaconnectapp.com}

# Twilio Programmable SMS acc used for OTP delivery to phone numbers.
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

do.spaces.endpoint=https://fra1.digitaloceanspaces.com
do.spaces.cdn-endpoint=https://yaya-doc.fra1.cdn.digitaloceanspaces.com
do.spaces.bucket=yaya-doc
do.spaces.access-key=${SPACES_ACCESS_KEY:}
do.spaces.secret-key=${SPACES_SECRET_KEY:}
do.spaces.region=fra1
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JPA (Hibernate) Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=${SERVER_PORT:8080}
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.example.marketplace=DEBUG
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-exception=true
server.forward-headers-strategy=native